function useLib(src, g) {
  const [ok, setOk] = useState(!!window[g]);
  useEffect(() => {
    if (window[g]) {
      setOk(true);
      return;
    }
    const s = document.createElement("script");
    s.src = src;
    s.onload = () => setOk(true);
    document.head.appendChild(s);
  }, []);
  return ok;
}

/* ══════════════════════════════════════════════════════
   MOTOR DE NORMALIZACIÓN — VERSIÓN BLINDADA v11
   Defensas: formatos numéricos chilenos, fechas
   ambiguas, escaneo dinámico > 400 filas, negativos

══════════════════════════════════════════════════════ */

/**
 * toN — Conversión a número a prueba de balas
 *
 * Vulnerabilidades del original:
 *   /[^0-9.\-]/ eliminaba comas-decimales CL: "1.500,75" → parseFloat("1500.75") incorrecto
 *   No manejaba negativos contables: (1500) → -1500
 *   No manejaba "1.234" chileno (punto=miles, no decimal)
 *   Fallaba con "$ 1.234,56" o "1 234,56" (espacios internos)
 *
 * Estrategia:
 *   1. Strip de símbolo monetario y espacios
 *   2. Detectar negativos entre paréntesis
 *   3. Inferir formato según posición del último separador
 */
const toN = v => {
  if (v === null || v === undefined || v === "") return 0;
  let s = String(v).trim();

  // Defensa 1: negativos contables (1500) o (1.500,00)
  const negContable = /^\(([^)]+)\)$/.test(s);
  if (negContable) s = "-" + s.slice(1, -1);

  // Defensa 2: strip de $ € £ CLP y espacios internos
  s = s.replace(/[$€£CLP\s]/g, "");
  if (!s || s === "-") return 0;

  // Defensa 3: inferir separadores por posición del último separador
  const lastComma = s.lastIndexOf(",");
  const lastDot = s.lastIndexOf(".");
  let normalized = s;
  if (lastComma > lastDot) {
    // Formato CL/ES: "1.234,56" — punto=miles, coma=decimal
    normalized = s.replace(/\./g, "").replace(",", ".");
  } else if (lastDot > lastComma) {
    const afterDot = s.slice(lastDot + 1);
    if (afterDot.length === 3 && lastComma < 0) {
      // "1.234" ambiguo chileno → entero (miles), sin decimales reales
      normalized = s.replace(/\./g, "");
    } else {
      // Formato EN o decimales reales: strip comas de miles
      normalized = s.replace(/,/g, "");
    }
  }
  const n = parseFloat(normalized);
  return isNaN(n) ? 0 : n;
};

/**
 * parseDate — Normalización universal de fechas a YYYY-MM-DD
 *
 * Vulnerabilidades del original:
 *   - Solo manejaba DD/MM/YYYY estricto (exactamente 2 dígitos)
 *   - No manejaba D/M/YY, D/M/YYYY, DD-MM-YYYY, YYYY/MM/DD
 *   - No manejaba seriales numéricos de Excel (45000 ≈ fecha 2023)
 *   - Fallback new Date() es timezone-unsafe → puede devolver día anterior
 */
function parseDate(s) {
  if (!s && s !== 0) return "";
  const raw = String(s).trim();
  if (!raw) return "";

  // Defensa 1: serial numérico Excel (entero 1–70000 sin separadores)
  const serial = parseFloat(raw);
  if (!isNaN(serial) && serial > 1 && serial < 70000 && !/[\/\-\.]/.test(raw)) {
    try {
      const d = new Date((serial - 25569) * 86400 * 1000);
      if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    } catch (_) {}
  }

  // Defensa 2: separadores / - . → capturar D/M/YY, D/M/YYYY, DD/MM/YYYY, YYYY-MM-DD
  const m = raw.match(/^(\d{1,4})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    let [, p1, p2, p3] = m;
    if (parseInt(p1) >= 1900) {
      // YYYY-MM-DD o YYYY/MM/DD
      return `${p1}-${p2.padStart(2, "0")}-${p3.padStart(2, "0")}`;
    } else {
      // DD/MM/YY o DD/MM/YYYY (estándar chileno)
      let y = p3;
      if (y.length === 2) y = parseInt(y) >= 50 ? "19" + y : "20" + y;
      return `${y}-${p2.padStart(2, "0")}-${p1.padStart(2, "0")}`;
    }
  }

  // Defensa 3: ISO parcial ya correcto
  if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0, 10);

  // Defensa 4: fallback timezone-safe
  try {
    const d = new Date(raw);
    if (!isNaN(d.getTime())) {
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }
  } catch (_) {}
  return raw; // Nunca crashear — devolver crudo
}
function readXLSX(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        /* raw:true → los números vienen como Number, no como string formateado
           "3,808" (CL miles) → 3808 correcto.
           cellDates:false → fechas como string DD/MM/YYYY para parseDate */
        const wb = window.XLSX.read(e.target.result, {
          type: "array",
          raw: true,
          cellDates: false
        });
        const ws = wb.Sheets[wb.SheetNames[0]];
        res(window.XLSX.utils.sheet_to_json(ws, {
          header: 1,
          defval: "",
          raw: true
        }));
      } catch (err) {
        rej(err);
      }
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

/* ══════════════════════════════════════════════════════════════
   MOTOR DE NORMALIZACIÓN — SOFTLAND MIM v16
   ──────────────────────────────────────────────────────────────
   Estrategia dual:
   1. FIRMA SOFTLAND: detecta el tipo exacto de informe por
      palabras clave en las primeras 50 filas y aplica un mapa
      de columnas conocido (columnas exactas verificadas en
      archivos reales MIM).
   2. FALLBACK HEURÍSTICO: si no reconoce la firma, cae al
      algoritmo dinámico anterior (detectStructure_heuristic).
   ──────────────────────────────────────────────────────────────
   Defensas contra inestabilidad Softland:
   • Herencia Folio/Fecha: si una fila ítem tiene celda de fecha
     vacía, hereda el último folio/fecha válidos vistos.
   • Filtro de filas basura: Totales, subtotales, glosas largas,
     filas con una sola celda, filas completamente vacías.
   • toN y parseDate blindados para formato CL completo.
   • Código válido: debe ser alfanumérico, ≥3 chars, no fecha,
     no número puro, no frase larga.
══════════════════════════════════════════════════════════════ */

/* DATE_RE ampliado: D/M/YYYY, DD/MM/YYYY, DD-MM-YYYY, ISO, serial Excel, YYYYMMDD */
const DATE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$|^\d{4}-\d{2}-\d{2}$|^\d{5}$|^\d{8}$/;

/* SKIP_WORDS — términos de filas administrativas Softland */
const SKIP_WORDS = ["totales", "total general", "período", "periodo", "subtotal", "sub-total", "gran total", "glosa", "concepto", "observaci", "nota:", "emitidos", "saldo anterior", "saldo final", "resumen", "informe", "página", "usuario", "empresa", "sociedad", "rut:", "fecha:", "hora:", "bodega :", "concepto de"];
/* Compatibilidad con código que usa SKIP */
const SKIP = SKIP_WORDS;

/* isSkipCell — devuelve true si el contenido es basura Softland */
function isSkipCell(v) {
  if (!v) return true;
  const s = String(v).trim().toLowerCase();
  if (!s) return true;
  if (SKIP_WORDS.some(w => s.startsWith(w) || s === w)) return true;
  if (/^[-=_*]{4,}/.test(s)) return true;
  return false;
}

/* isSkipRow — fila de glosa/totales por primera celda (compatibilidad) */
function isSkipRow(row, col) {
  return isSkipCell(row[col]);
}

/* isValidCodigo — código de producto Softland válido */
function isValidCodigo(v) {
  if (!v) return false;
  const s = String(v).trim();
  if (s.length < 2 || s.length > 25) return false;
  if (DATE_RE.test(s)) return false;
  if (/^\d+[.,]?\d*$/.test(s)) return false;
  if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(s)) return false;
  if (s.split(' ').length > 4) return false;
  if (isSkipCell(s)) return false;
  return /^[A-Za-z][A-Za-z0-9\-_\.\/]{1,24}/.test(s);
}

/* ──────────────────────────────────────────────────────────────
   FIRMAS DE INFORME SOFTLAND MIM
   (índices de columna verificados contra archivos reales MIM)
   ────────────────────────────────────────────────────────────── */
const SOFTLAND_SIGNATURES = {
  /*
   * INFORME DE GUÍAS DE SALIDA
   * Guía-row:  fecha=col0, folio=col3, estado=col15, ndcto=col8
   * Ítem-row:  codigo=col0, desc=col6, tipo=col17, um=col24,
   *            qty=col28, pu=col34, total=col51
   */
  SALIDA: {
    titleKeyword: "salida",
    guia: {
      fecha: 0,
      folio: 3,
      estado: 15,
      ndcto: 8,
      origen: -1
    },
    item: {
      codigo: 0,
      desc: 6,
      tipo: 17,
      um: 24,
      qty: 28,
      pu: 34,
      total: 51
    }
  },
  /*
   * INFORME DE GUÍAS DE RECEPCIÓN (Entradas)
   * Guía-row:  fecha=col1, folio=col2, ndcto=col5, estado=col10, origen=col12
   * Ítem-row:  codigo=col1, desc=col7, um=col18, qty=col22, pu=col25, total=col30
   */
  ENTRADA: {
    titleKeyword: "recepc",
    guia: {
      fecha: 1,
      folio: 2,
      estado: 10,
      ndcto: 5,
      origen: 12
    },
    item: {
      codigo: 1,
      desc: 7,
      tipo: -1,
      um: 18,
      qty: 22,
      pu: 25,
      total: 30
    }
  }
};

/* detectSoftlandType — escanea las primeras 50 filas para identificar
   el tipo de informe Softland. Devuelve "SALIDA" | "ENTRADA" | null. */
function detectSoftlandType(arr) {
  for (let i = 0; i < Math.min(arr.length, 50); i++) {
    const line = arr[i].map(c => String(c || "").toLowerCase()).join(" ");
    if (line.includes("salida")) return "SALIDA";
    if (line.includes("recepci")) return "ENTRADA";
    if (line.includes("entrada")) return "ENTRADA";
  }
  return null;
}

/* detectStructure — Parser híbrido:
   1. Intenta reconocer firma Softland MIM (mapa exacto de columnas).
   2. Fallback: algoritmo heurístico dinámico para formatos desconocidos. */
function detectStructure(arr) {
  if (!arr || !arr.length) return null;

  /* ── 1. FIRMA SOFTLAND ── */
  const tipo = detectSoftlandType(arr);
  if (tipo && SOFTLAND_SIGNATURES[tipo]) {
    const sig = SOFTLAND_SIGNATURES[tipo];
    return {
      _softlandType: tipo,
      _sig: sig,
      fCol: sig.guia.fecha,
      folioCol: sig.guia.folio,
      estadoCol: sig.guia.estado,
      ndctoCol: sig.guia.ndcto,
      origenCol: sig.guia.origen,
      descCol: sig.item.desc,
      tipoCol: sig.item.tipo,
      umCol: sig.item.um,
      qtyCol: sig.item.qty,
      precioCol: sig.item.pu,
      totalCol: sig.item.total,
      _useSoftlandParser: true
    };
  }

  /* ── 2. FALLBACK HEURÍSTICO ── */
  return detectStructure_heuristic(arr);
}

/* detectStructure_heuristic — algoritmo dinámico para archivos
   con estructura no reconocida como Softland MIM. */
function detectStructure_heuristic(arr) {
  const SCAN_LIMIT = Math.min(arr.length, 2000);
  const sample = arr.slice(0, SCAN_LIMIT);
  const fc = {};
  for (let i = 0; i < sample.length; i++) {
    const row = sample[i];
    for (let c = 0; c < Math.min(row.length, 15); c++) {
      if (DATE_RE.test(String(row[c] || "").trim())) fc[c] = (fc[c] || 0) + 1;
    }
  }
  const fe = Object.entries(fc).sort((a, b) => b[1] - a[1])[0];
  if (!fe) return null;
  const fCol = parseInt(fe[0]);
  const hRows = sample.filter(row => DATE_RE.test(String(row[fCol] || "").trim())).slice(0, 20);
  if (!hRows.length) return null;
  const hThr = Math.max(2, Math.floor(hRows.length * 0.3));
  let folioCol = -1;
  for (let c = fCol + 1; c < 25; c++) {
    if (hRows.filter(r => toN(r[c]) > 0).length >= hThr) {
      folioCol = c;
      break;
    }
  }
  let estadoCol = -1;
  for (let c = 0; c < 30; c++) {
    const m = hRows.map(r => String(r[c] || "").trim().toLowerCase()).filter(v => v === "vigente" || v === "anulado" || v === "anulada").length;
    if (m >= hThr) {
      estadoCol = c;
      break;
    }
  }
  let ndctoCol = -1;
  if (folioCol >= 0 && estadoCol > folioCol + 1) {
    for (let c = folioCol + 1; c < estadoCol; c++) {
      if (hRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 0).length >= hThr) {
        ndctoCol = c;
        break;
      }
    }
  }
  let origenCol = -1;
  if (estadoCol >= 0) {
    for (let c = estadoCol + 1; c < Math.min(estadoCol + 12, 35); c++) {
      if (hRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 2).length >= hThr) {
        origenCol = c;
        break;
      }
    }
  }
  const itemRows = [];
  let inBlock = false;
  for (let i = 0; i < sample.length; i++) {
    const row = sample[i];
    const v = String(row[fCol] || "").trim();
    if (DATE_RE.test(v)) {
      inBlock = true;
      continue;
    }
    if (!inBlock || !v) continue;
    if (isSkipCell(v)) continue;
    if (row.filter((v2, j) => j > fCol && toN(v2) > 0).length >= 2) {
      itemRows.push(row);
      if (itemRows.length >= 80) break;
    }
  }
  if (!itemRows.length) return null;
  const iThr = Math.max(3, Math.floor(itemRows.length * 0.35));
  let descCol = -1;
  for (let c = fCol + 1; c < 25; c++) {
    const v = itemRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 4 && !/^\d/.test(v));
    if (v.length >= Math.min(5, itemRows.length * 0.6)) {
      descCol = c;
      break;
    }
  }
  let umCol = -1;
  const umRe = /^[A-Za-záéíóú]{1,5}$/;
  for (let c = (descCol >= 0 ? descCol : fCol) + 1; c < 40; c++) {
    if (itemRows.map(r => String(r[c] || "").trim()).filter(v => umRe.test(v)).length >= itemRows.length * 0.4) {
      umCol = c;
      break;
    }
  }
  let tipoCol = -1;
  if (descCol >= 0 && umCol > descCol + 1) {
    for (let c = descCol + 1; c < umCol; c++) {
      if (itemRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 0 && isNaN(v)).length >= iThr) {
        tipoCol = c;
        break;
      }
    }
  }
  const startNum = (umCol >= 0 ? umCol : descCol >= 0 ? descCol : fCol) + 1;
  const ncm = {};
  for (let ri = 0; ri < itemRows.length; ri++) {
    const row = itemRows[ri];
    for (let c = startNum; c < row.length; c++) if (toN(row[c]) > 0) ncm[c] = (ncm[c] || 0) + 1;
  }
  const thr = Math.max(1, itemRows.length * 0.35);
  const ncs = Object.entries(ncm).filter(([, cnt]) => cnt >= thr).map(([c]) => parseInt(c)).sort((a, b) => a - b);
  let qtyCol = -1,
    precioCol = -1,
    totalCol = -1;
  if (ncs.length >= 3) {
    const wa = ncs.map(c => ({
      c,
      avg: itemRows.reduce((s, r) => s + toN(r[c]), 0) / itemRows.length
    })).sort((a, b) => b.avg - a.avg);
    totalCol = wa[0].c;
    precioCol = wa[1].c;
    qtyCol = wa.slice(2).sort((a, b) => a.avg - b.avg)[0]?.c ?? -1;
  } else if (ncs.length === 2) {
    const wa = ncs.map(c => ({
      c,
      avg: itemRows.reduce((s, r) => s + toN(r[c]), 0) / itemRows.length
    })).sort((a, b) => b.avg - a.avg);
    totalCol = wa[0].c;
    qtyCol = wa[1].c;
  } else if (ncs.length === 1) totalCol = ncs[0];
  return {
    fCol,
    folioCol,
    estadoCol,
    ndctoCol,
    origenCol,
    descCol,
    tipoCol,
    umCol,
    qtyCol,
    precioCol,
    totalCol
  };
}

/* parseMovimientos — dispatcher: usa Softland exacto o fallback heurístico */
function parseMovimientos(arr, tipoDoc) {
  const st = detectStructure(arr);
  if (!st) return [];
  return st._useSoftlandParser ? parseSoftlandMovimientos(arr, tipoDoc, st) : parseMovimientos_heuristic(arr, tipoDoc, st);
}

/* parseSoftlandMovimientos — lector con mapa exacto + herencia folio/fecha.
   Reglas implementadas:
   R1-R2: Búsqueda dinámica de firma + mapeo de índices exactos.
   R3: Noise reduction: líneas "Totales :", glosas, filas vacías.
   R4: Herencia de Folio/Fecha para filas sin cabecera propia. */
function parseSoftlandMovimientos(arr, tipoDoc, st) {
  const sig = st._sig;
  const gCol = sig.guia;
  const iCol = sig.item;
  const records = [];
  let cFecha = "",
    cFolio = "",
    cEst = "Vigente",
    cNd = "",
    cOr = "";
  for (let i = 0; i < arr.length; i++) {
    const row = arr[i];

    /* ── Fila de guía (cabecera de folio) ──
       Criterio: fecha válida en gCol.fecha + folio no vacío */
    const rawFecha = String(row[gCol.fecha] || "").trim();
    const rawFolio = String(gCol.folio >= 0 ? row[gCol.folio] || "" : "").trim();
    const rawEst = String(gCol.estado >= 0 ? row[gCol.estado] || "" : "").trim();
    if (DATE_RE.test(rawFecha) && (toN(rawFolio) > 0 || rawFolio !== "")) {
      const estLow = rawEst.toLowerCase();
      if (["vigente", "anulado", "anulada", ""].includes(estLow)) {
        cFecha = parseDate(rawFecha);
        cFolio = /^\d+$/.test(rawFolio.replace(/\s/g, "")) ? String(parseInt(rawFolio, 10)) : rawFolio;
        cEst = rawEst || "Vigente";
        cNd = gCol.ndcto >= 0 ? String(row[gCol.ndcto] || "").trim() : "";
        cOr = gCol.origen >= 0 ? String(row[gCol.origen] || "").trim() : "";
        continue;
      }
    }

    /* ── R3: Noise reduction ── */
    const rowText = row.map(c => String(c || "")).join(" ").toLowerCase();
    if (rowText.includes("totales") || rowText.includes("total :")) continue;

    /* ── Fila de ítem ── */
    const rawCodigo = String(row[iCol.codigo] || "").trim();
    const rawDesc = String(row[iCol.desc] || "").trim();
    if (!isValidCodigo(rawCodigo)) continue;
    if (!rawDesc || isSkipCell(rawDesc)) continue;
    const qty = toN(row[iCol.qty]);
    const pu = toN(row[iCol.pu]);
    const tot = toN(row[iCol.total]);
    const total = tot || qty * pu || 0;
    if (qty === 0 && total === 0) continue;
    const um = iCol.um >= 0 ? String(row[iCol.um] || "").trim() || "UN" : "UN";
    const tipo = iCol.tipo >= 0 ? String(row[iCol.tipo] || "").trim() : "";

    /* R4: Herencia de Folio/Fecha si no se inicializó (archivo sin encabezado) */
    if (!cFecha && DATE_RE.test(rawFecha)) cFecha = parseDate(rawFecha);
    const rec = {
      Fecha: cFecha,
      Folio: /^\d+$/.test(cFolio) ? parseInt(cFolio, 10) : cFolio || "",
      Estado: cEst || "Vigente",
      Codigo: rawCodigo,
      Descripcion: rawDesc,
      UM: um,
      Cantidad: qty,
      PrecioUnit: pu,
      Total: total,
      _tipo: tipoDoc
    };
    if (cNd) rec.NDocto = cNd;
    if (cOr) rec.Origen = cOr;
    if (tipo) rec.TipoEmision = tipo;
    records.push(rec);
  }
  return records;
}

/* parseMovimientos_heuristic — rama para archivos de formato genérico */
function parseMovimientos_heuristic(arr, tipoDoc, st) {
  const records = [];
  let cF = "",
    cFol = "",
    cEst = "",
    cNd = "",
    cOr = "";
  for (let i = 0; i < arr.length; i++) {
    const row = arr[i];
    const v = String(row[st.fCol] || "").trim();
    if (DATE_RE.test(v)) {
      const fvStr = String(st.folioCol >= 0 ? row[st.folioCol] : "").trim();
      const estRaw = st.estadoCol >= 0 ? String(row[st.estadoCol] || "").trim() : "";
      if (fvStr !== "") {
        const estLow = estRaw.toLowerCase();
        if (["vigente", "anulado", "anulada", ""].includes(estLow)) {
          cF = parseDate(v);
          cFol = /^\d+$/.test(fvStr.replace(/\s/g, "")) ? String(parseInt(fvStr, 10)) : fvStr;
          cEst = estRaw;
          cNd = st.ndctoCol >= 0 ? String(row[st.ndctoCol] || "").trim() : "";
          cOr = st.origenCol >= 0 ? String(row[st.origenCol] || "").trim() : "";
          continue;
        }
      }
    }
    if (!v || DATE_RE.test(v)) continue;
    if (isSkipRow(row, st.fCol)) continue;
    const desc = st.descCol >= 0 ? String(row[st.descCol] || "").trim() : "";
    if (!desc || isSkipCell(desc)) continue;
    const tipo = st.tipoCol >= 0 ? String(row[st.tipoCol] || "").trim() : "";
    const um = st.umCol >= 0 ? String(row[st.umCol] || "").trim() || "UN" : "UN";
    const qty = st.qtyCol >= 0 ? toN(row[st.qtyCol]) : 0;
    const pu = st.precioCol >= 0 ? toN(row[st.precioCol]) : 0;
    const tot = st.totalCol >= 0 ? toN(row[st.totalCol]) : 0;
    const total = tot || qty * pu || 0;
    if (qty === 0 && total === 0) continue;
    const rec = {
      Fecha: cF,
      Folio: /^\d+$/.test(cFol) ? parseInt(cFol, 10) : cFol || "",
      Estado: cEst || "Vigente",
      Codigo: v,
      Descripcion: desc,
      UM: um,
      Cantidad: qty,
      PrecioUnit: pu,
      Total: total,
      _tipo: tipoDoc
    };
    if (cNd) rec.NDocto = cNd;
    if (cOr) rec.Origen = cOr;
    if (tipo) rec.TipoEmision = tipo;
    records.push(rec);
  }
  return records;
}
function parseStock(arr) {
  if (!arr || !arr.length) return [];
  const HDR = ["código", "codigo", "descripción", "descripcion", "stock", "existencia", "saldo", "costo", "precio", "valor", "u/m", "unidad", "cantidad", "bodega", "articulo", "artículo"];

  // Defensa 1: escanear hasta 80 filas para encabezados (vs 40 anterior)
  let hRow = -1,
    maxH = 0;
  for (let i = 0; i < Math.min(arr.length, 80); i++) {
    const rs = arr[i].map(c => String(c || "").toLowerCase()).join(" ");
    const hits = HDR.filter(k => rs.includes(k)).length;
    if (hits > maxH) {
      maxH = hits;
      hRow = i;
    }
  }

  // Defensa 2: fallback heurístico si no hay encabezado reconocible
  if (hRow < 0 || maxH < 2) {
    const CR = /^[A-Za-z0-9]{2,}/;
    for (let i = 0; i < Math.min(arr.length, 80); i++) {
      if (arr[i + 1] && CR.test(String(arr[i + 1][0] || "").trim()) && arr[i + 1].some((v, j) => j > 0 && toN(v) > 0)) {
        hRow = i;
        break;
      }
    }
  }
  if (hRow < 0) return [];
  const headers = arr[hRow].map(c => String(c || "").toLowerCase().trim());
  const fc = (...terms) => {
    for (const t of terms) {
      const i = headers.findIndex(h => h.includes(t));
      if (i >= 0) return i;
    }
    return -1;
  };
  let ci = {
    cod: fc("digo", "cod", "articulo", "artículo"),
    desc: fc("descripci", "desc", "nombre", "detalle"),
    um: fc("u/m", "unidad", "um"),
    stock: fc("stock", "existencia", "saldo", "cantidad"),
    cu: fc("costo uni", "precio uni", "c.unit", "p.unit", "costo u", "precio u"),
    ct: fc("costo tot", "valor tot", "importe", "total", "saldo $"),
    bod: fc("bodega", "almac", "ubicac"),
    cat: fc("categor", "familia", "grupo", "clase")
  };

  // Defensa 3: muestra de 100 filas (vs 30) para estadísticas más robustas
  const dataRows = arr.slice(hRow + 1).filter(r => r.some(c => String(c || "").trim() !== "")).slice(0, 100);
  if (ci.cod < 0 || ci.desc < 0) {
    const ncm = {};
    for (let ri = 0; ri < dataRows.length; ri++) {
      const row = dataRows[ri];
      for (let c = 0; c < row.length; c++) if (toN(row[c]) > 0) ncm[c] = (ncm[c] || 0) + 1;
    }
    const thr = Math.max(1, dataRows.length * 0.35); // 35% más tolerante
    const ncs = Object.entries(ncm).filter(([, cnt]) => cnt >= thr).map(([c]) => parseInt(c)).sort((a, b) => a - b);

    // Código: alfanumérico corto, no puramente numérico
    if (ci.cod < 0) {
      for (let c = 0; c < 12; c++) {
        const vals = dataRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 0);
        if (vals.filter(v => /^[A-Za-z0-9\-]{2,20}$/.test(v) && isNaN(v)).length > vals.length * 0.5) {
          ci.cod = c;
          break;
        }
      }
    }
    // Descripción: texto largo no-numérico
    if (ci.desc < 0 && ci.cod >= 0) {
      for (let c = ci.cod + 1; c < ci.cod + 12; c++) {
        const vals = dataRows.map(r => String(r[c] || "").trim()).filter(v => v.length > 5 && isNaN(v));
        if (vals.length > dataRows.length * 0.5) {
          ci.desc = c;
          break;
        }
      }
    }
    if (ncs.length >= 3) {
      const wa = ncs.map(c => ({
        c,
        avg: dataRows.reduce((s, r) => s + toN(r[c]), 0) / dataRows.length
      })).sort((a, b) => b.avg - a.avg);
      if (ci.ct < 0) ci.ct = wa[0].c;
      if (ci.cu < 0) ci.cu = wa[1].c;
      if (ci.stock < 0) ci.stock = wa.slice(2).sort((a, b) => a.avg - b.avg)[0]?.c ?? -1;
    } else if (ncs.length === 2) {
      const wa = ncs.map(c => ({
        c,
        avg: dataRows.reduce((s, r) => s + toN(r[c]), 0) / dataRows.length
      })).sort((a, b) => b.avg - a.avg);
      if (ci.ct < 0) ci.ct = wa[0].c;
      if (ci.stock < 0) ci.stock = wa[1].c;
    } else if (ncs.length === 1 && ci.ct < 0) {
      ci.ct = ncs[0];
    }
    if (ci.um < 0 && ci.desc >= 0) {
      const umRe = /^[A-Za-záéíóú]{1,5}$/;
      for (let c = ci.desc + 1; c < Math.min(ci.desc + 10, arr[hRow].length); c++) {
        if (dataRows.map(r => String(r[c] || "").trim()).filter(v => umRe.test(v)).length >= dataRows.length * 0.35) {
          ci.um = c;
          break;
        }
      }
    }
  }
  const recs = [];
  for (let i = hRow + 1; i < arr.length; i++) {
    const row = arr[i];
    if (!row.some(c => String(c || "").trim() !== "")) continue;
    const cod = ci.cod >= 0 ? String(row[ci.cod] || "").trim() : "";
    if (!cod || cod.length < 2) continue;
    // Defensa 4: reject si el código parece ser una fila de resumen
    if (SKIP.some(w => cod.toLowerCase().startsWith(w))) continue;
    // Defensa 5: reject si el código es una fecha (artefacto de Softland)
    if (DATE_RE.test(cod)) continue;
    const desc = ci.desc >= 0 ? String(row[ci.desc] || "").trim() : "";
    if (!desc || SKIP.some(w => desc.toLowerCase().startsWith(w))) continue;
    const stock = ci.stock >= 0 ? toN(row[ci.stock]) : 0;
    const cu = ci.cu >= 0 ? toN(row[ci.cu]) : 0;
    const ct = ci.ct >= 0 ? toN(row[ci.ct]) : 0;
    const um = ci.um >= 0 ? String(row[ci.um] || "").trim() : "UN";
    // Defensa 6: normalizar Bodega y Categoria con trim + collapse spaces
    const bod = ci.bod >= 0 ? String(row[ci.bod] || "").trim().replace(/\s+/g, " ") : "";

/* ══════════════════════════════════════
   SANITIZE — cross-referencing centralizado
   Prioridad de costo: 1° preciosManuales, 2° CostoUnit fila, 3° ph histórico, 4° 0
   Rellena CostoUnit=0 usando el mayor precio conocido de sal+ent+stock combinados.
   preciosManuales: dict opcional { [Codigo]: número } — correcciones en caliente
══════════════════════════════════════ */
function getSanitizedStock(stockArr, salArr, entArr, preciosManuales) {
  var pm = preciosManuales || {};
  var ph = {};
  [].concat(salArr || [], entArr || [], stockArr || []).forEach(function (r) {
    var pu = toN(r.PrecioUnit || r.CostoUnit || 0);
    if (pu > 0 && (!ph[r.Codigo] || pu > ph[r.Codigo])) ph[r.Codigo] = pu;
  });
  return (stockArr || []).map(function (r) {
    var stock = Number(r.Stock) || 0;

    // Prioridad 1: corrección manual en caliente
    var cuManual = pm[r.Codigo] ? toN(pm[r.Codigo]) : 0;
    if (cuManual > 0) {
      return Object.assign({}, r, {
        CostoUnit: cuManual,
        CostoTotal: stock * cuManual,
        // recálculo estricto
        _costoFuente: "manual"
      });
    }

    // Prioridad 2: costo que trae la fila original (Softland)
    // — CostoTotal SIEMPRE recalculado: no se confía en la columna del Excel
    var cuOriginal = toN(r.CostoUnit);
    if (cuOriginal > 0) {
      return Object.assign({}, r, {
        CostoUnit: cuOriginal,
        CostoTotal: stock * cuOriginal,
        // recálculo estricto
        _costoFuente: "softland"
      });
    }

    // Prioridad 3: cruce histórico con sal/ent/stock anteriores
    var cuHistorico = ph[r.Codigo] || 0;
    if (cuHistorico > 0) {
      return Object.assign({}, r, {
        CostoUnit: cuHistorico,
        CostoTotal: stock * cuHistorico,
        // recálculo estricto
        _costoFuente: "historico"
      });
    }

    // Prioridad 4: carga física sin costo (valorización pendiente)
    return Object.assign({}, r, {
      CostoUnit: 0,
      CostoTotal: 0,
      _costoFuente: "pendiente"
    });
  });
}

   EXPORT

function exportXLSX(datasets) {
  const wb = window.XLSX.utils.book_new();
  const LBL = {
    Codigo: "Código",
    Descripcion: "Descripción",
    UM: "U/M",
    CostoUnit: "Costo Unitario",
    CostoTotal: "Costo Total",
    PrecioUnit: "Precio Unitario",
    NDocto: "N° Dcto",
    TipoEmision: "Tipo Emisión"
  };
  var filename = "base_normalizada_MIM.xlsx";
  var stoDS = null;
  for (var di = 0; di < datasets.length; di++) {
    if (datasets[di].tipo === "stock") {
      stoDS = datasets[di];
      break;
    }
  }
  if (stoDS && stoDS.stoMonth && typeof stoDS.stoMonth === "string" && stoDS.stoMonth.indexOf("-") > -1) {
    var parts = stoDS.stoMonth.split("-");
    var yr = parts[0];
    var mo = parseInt(parts[1], 10);
    if (!isNaN(mo) && mo >= 1 && mo <= 12) filename = "stock_" + MESES_ES[mo - 1] + "_" + yr + ".xlsx";
  }
  datasets.forEach(function (ds) {
    if (!ds.records || !ds.records.length) return;
    var clean = ds.records.map(function (r) {
      var o = {};
      Object.keys(r).forEach(function (k) {
        if (k !== "_tipo" && k !== "_periodo") o[LBL[k] || k] = r[k];
      });
      return o;
    });
    var ws = window.XLSX.utils.json_to_sheet(clean);
    var keys = Object.keys(clean[0]);
    ws["!cols"] = keys.map(function (k) {
      var maxLen = k.length;
      clean.slice(0, 50).forEach(function (row) {
        var l = String(row[k] || "").length;
        if (l > maxLen) maxLen = l;
      });
      return {
        wch: Math.min(maxLen + 2, 40)
      };
    });
    window.XLSX.utils.book_append_sheet(wb, ws, ds.name.slice(0, 31));
  });
  window.XLSX.writeFile(wb, filename);
}

  const m = {};

  (recs || []).forEach(r => {
    const k = r.Fecha ? r.Fecha.slice(0, 7) : null;
    if (k && m[k] !== undefined) m[k] += r.Total || 0;
  });
  return months.map(k => m[k]);

function mimFmtM(n) {
  if (!n) return "$0";
  if (n >= 1e9) return "$" + (n/1e9).toFixed(1) + "B";
  if (n >= 1e6) return "$" + (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return "$" + (n/1e3).toFixed(1) + "K";
  return "$" + Math.round(n).toLocaleString("es-CL");
}

  const months   = getMonths(vigSal);

  });

  const tSal = vigSal.reduce((s,r)=>s+(r.Total||0),0);
  const tEnt = vigEnt.reduce((s,r)=>s+(r.Total||0),0);

    /* cm = promedio mensual de salidas del SKU (total acumulado / nmKpi=12) */

    const cdMeses = cm > 0 ? (r.CostoTotal||0) / cm : 9999;
    const cdM     = isFinite(cdMeses) && cdMeses >= 0 ? +cdMeses.toFixed(2) : 9999;

    /* Sin movimiento: SKU sin ninguna salida vigente en el período (SUMAR.SI H=0) */

    const est = sinMov       ? "Sin movimiento"
              : cdM < 0.5   ? "CRITICO"
              : cdM < 1     ? "Bajo"
              : cdM > 6     ? "Sobrestock"

    return { ...r, _cm: cm, _cd: cd, _cdM: cdM, _est: est,

    consMes, consMesTotalProm, stoRows, paretoRows, totalInv,
    tSal, tEnt, nSinMov,

    nBajo: stoRows.filter(r=>r._est==="Bajo").length,
